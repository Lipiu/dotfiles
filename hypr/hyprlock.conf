# BACKGROUND
background {
  monitor =
  path = ~/.config/hypr/assets/hyprlock-bg.jpg
  blur_passes = 1
  brightness = 0.5
}

general {
  ignore_empty_input = true
}

# INPUT FIELD
input-field {
  monitor =
  size = 250, 60
  outline_thickness = 0
  dots_size = 0.2
  dots_spacing = 0.4
  dots_center = true
  outer_color = rgba(ffffffff)
  inner_color = rgba(ffffff40)
  font_color = rgba(ffffffff)
  font_family = JetBrainsMono NerdFont
  placeholder_text = input password...
  fade_on_empty = false
  rounding = -1
  position = 0, -100
  halign = center
  valign = center
}

# DATE
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%A, %B %d")"
  color = rgb(cdd6f4)
  font_size = 22
  font_family = JetBrainsMono NerdFont
  position = -105, 65
  halign = right
  valign = bottom
}

# TIME
label {
  monitor = 
  text = cmd[update:1000] echo "$(date +"%-I:%M %p")"
  color = rgb(cdd6f4)
  font_size = 95
  font_family = JetBrainsMono NerdFont
  position = -100, 70
  halign = right
  valign = bottom
}

# Profile Picture
image {
  monitor =
  path = ~/.config/hypr/assets/hyprlock-pfp.jpg
  size = 200
  border_size = 0
  position = 0, 60
  halign = center
  valign = center
}

# Welcome Message
label {
  monitor =
  text = cmd[update:1000] echo "welcome back, $(whoami)"
  color = rgb(cdd6f4)
  font_size = 14
  font_family = JetBrainsMono Nerd Font
  position = 0, -170
  halign = center
  valign = center
}
